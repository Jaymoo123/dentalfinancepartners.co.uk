# Known UK tax & accounting facts (2026/27 tax year).
# Used by fact_checker to validate LLM-generated content does not hallucinate
# specific numbers. Each fact is matched as a regex; if generated content
# contains a *different* value for the same concept, it gets flagged.
#
# Format:
#   - id:     short id
#     concept: human-readable name
#     value:   the correct value as a string
#     patterns: list of regexes that, if matched in content, must be paired with `value`
#     aliases: list of alternative phrasings of the concept (for value-extraction context)
#     valid_from: tax year start
#
# Maintain this file carefully — it's the source of truth.

# --- Income tax ---
- id: personal_allowance_2026_27
  concept: Personal Allowance
  value: "12,570"
  patterns:
    - "personal allowance"
  aliases:
    - personal allowance
    - tax-free allowance
  valid_from: 2026-04-06

- id: basic_rate_band_top_2026_27
  concept: Basic rate threshold (top of basic rate)
  value: "50,270"
  patterns:
    - "basic rate threshold"
    - "higher rate threshold"
    - "top of basic rate"
  aliases:
    - basic rate threshold
    - higher rate threshold
  valid_from: 2026-04-06

- id: additional_rate_threshold_2026_27
  concept: Additional rate threshold
  value: "125,140"
  patterns:
    - "additional rate threshold"
  valid_from: 2026-04-06

# --- CGT ---
- id: cgt_residential_basic_rate_2026_27
  concept: CGT residential property basic rate
  value: "18%"
  patterns:
    - "cgt.*residential.*basic"
    - "capital gains.*basic.*residential"
  valid_from: 2026-04-06

- id: cgt_residential_higher_rate_2026_27
  concept: CGT residential property higher rate
  value: "24%"
  patterns:
    - "cgt.*residential.*higher"
    - "capital gains.*higher.*residential"
  valid_from: 2026-04-06

- id: cgt_annual_exempt_amount_2026_27
  concept: CGT Annual Exempt Amount
  value: "3,000"
  patterns:
    - "cgt annual exempt amount"
    - "annual exempt amount"
    - "capital gains.*allowance"
  valid_from: 2026-04-06

- id: cgt_reporting_window_days
  concept: CGT property reporting window
  value: "60"
  patterns:
    - "60-day.*cgt"
    - "60 days.*cgt"
    - "cgt.*60 days"
    - "cgt.*60-day"
  valid_from: 2020-04-06  # introduced earlier; still current

# --- Corporation tax ---
- id: corp_tax_small_profits_rate_2026_27
  concept: Corporation Tax small profits rate
  value: "19%"
  patterns:
    - "small profits rate"
  valid_from: 2023-04-01

- id: corp_tax_main_rate_2026_27
  concept: Corporation Tax main rate
  value: "25%"
  patterns:
    - "main rate.*corporation tax"
    - "corporation tax.*main rate"
  valid_from: 2023-04-01

- id: corp_tax_small_profits_threshold
  concept: Corporation Tax small profits threshold
  value: "50,000"
  patterns:
    - "small profits.*threshold"
    - "50,?000.*small profits"
  valid_from: 2023-04-01

- id: corp_tax_main_rate_threshold
  concept: Corporation Tax main rate threshold (upper limit)
  value: "250,000"
  patterns:
    - "main rate.*threshold"
    - "250,?000.*corporation"
  valid_from: 2023-04-01

# --- AIA / capital allowances ---
- id: aia_annual_cap_2026_27
  concept: Annual Investment Allowance cap
  value: "1,000,000"
  patterns:
    - "annual investment allowance.*cap"
    - "aia.*cap"
    - "aia.*£1"
  aliases:
    - "£1m"
    - "£1 million"
  valid_from: 2023-04-01

