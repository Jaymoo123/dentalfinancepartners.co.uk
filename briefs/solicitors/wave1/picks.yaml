wave: 1
# Wave 1 = the SOLICITORS proving wave: 9 net-new pages across 3 clusters, the
# small end-to-end run that validates the net-new pipeline for this site
# (the Dentists "Wave 1" / Property "Wave 9" model). Clusters chosen as
# genuinely net-new vs the 149 existing posts (the corpus is already mature on
# salaried-member, LLP tax, SRA rules, disbursements/counsel VAT, conveyancing
# SDLT, PII, IR35, goodwill, WIP, asset-vs-share sale, basis-period reform), and
# anchored to docs/solicitors/house_positions.md. Each exercises a current/
# 2026 statutory anchor (good drift-detection signal for the proving run).

buckets:
  A:
    label: "Bucket A - Incorporation, ABS & corporate structures (post-FA-2026). Category: Structure & Incorporation"
    picks:
      - id: A1
        slug: "should-a-law-firm-incorporate-2026-dividend-rise"
        label: "Should a UK law firm incorporate in 2026/27? LLP vs limited company after the FA 2026 dividend rise (10.75/35.75), CT 19/25, loss of tax transparency, salaried-member interaction. HP §1, §3, §2.A"
      - id: A2
        slug: "corporate-member-llp-law-firm-mixed-membership-rules"
        label: "Corporate members in a law firm LLP: capping profit at the CT rate and the mixed-membership anti-avoidance rules (ITTOIA s.850C-E). HP §2, §3 + LOCK s.850C at gate"
      - id: A3
        slug: "converting-law-firm-to-limited-company-abs-tax"
        label: "Converting a partnership/LLP law firm to a COMPANY or ABS (a different step from the existing partnership->LLP llp-conversion-tax-guide, which it must cross-link + differentiate): SRA recognised-body vs licensed-body (Legal Services Act 2007 Part 5) + s162 incorporation relief + goodwill + WIP. HP §1, §9"

  B:
    label: "Bucket B - VAT beyond the basics for law firms. Category: VAT & Compliance"
    picks:
      - id: B1
        slug: "law-firm-partial-exemption-vat-client-account-interest"
        label: "Partial exemption for law firms: when exempt income (client-account/designated-deposit interest) restricts input VAT recovery; de minimis (£625/mo & £7,500/yr & <=50%), standard method. HP §6 + LOCK partial-exemption sub at gate"
      - id: B2
        slug: "vat-tax-point-time-of-supply-law-firm-billing"
        label: "VAT tax point / time of supply for legal fees: interim statute bills vs requests for payment, payments on account, the 14-day rule, work spanning a rate/registration change. NET-NEW (the overseas/place-of-supply topic is already covered by vat-on-overseas-clients-uk-legal-services). HP §6 + LOCK time-of-supply sub at gate"
      - id: B3
        slug: "option-to-tax-law-firm-premises-capital-goods-scheme"
        label: "Option to tax (VATA Sch 10) and the Capital Goods Scheme (£250k land, 10 intervals) on law-firm premises; interaction with partial exemption. HP §6, §8 + LOCK OTT/CGS sub at gate"

  C:
    label: "Bucket C - Becoming, funding and reserving as a law-firm partner. Category: Partnership & LLP Accounting"
    picks:
      - id: C1
        slug: "fixed-share-to-equity-partner-promotion-tax-law-firm"
        label: "Tax when a solicitor is promoted from fixed-share (salaried-member-risk) to full equity partner: exit from salaried-member rules, switch from PAYE/Class 1 to self-employment/Class 4, capital buy-in trigger, first payments on account. NET-NEW (buy-in COST is covered by how-much-does-it-cost-to-buy-into-uk-law-firm-partnership; this is the status/tax change). HP §2.A, §2, §3"
      - id: C2
        slug: "law-firm-partner-capital-accounts-tax-treatment"
        label: "Partner capital accounts vs current accounts in a law firm: tax treatment, interest on capital, how capital is taxed (or not) vs profit share. HP §2, §3"
      - id: C3
        slug: "law-firm-partner-tax-reserving-payments-on-account"
        label: "Tax reserving for law firm partners: payments on account mechanics, the basis-period-reform transition-profit cash squeeze, how much to hold back. HP §3, §4 (verify spreading detail at gate)"
