name: Daily Analytics Optimization

on:
  # Disabled 2026-05-18: cron was running daily across niches and burning LLM
  # tokens with little measurable benefit. Run manually via workflow_dispatch
  # when needed, or re-enable the schedule below if/when the agent is rebuilt.
  # schedule:
  #   - cron: '0 8 * * *'  # 8 AM UTC daily (after content generation)
  workflow_dispatch:

jobs:
  analyze-and-optimize:
    name: Analyze GA4 and Optimize Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install anthropic httpx python-dotenv google-analytics-data google-auth
      
      - name: Run Analytics Optimization Agent
        run: python agents/analytics_optimization_agent.py --niche all
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GA4_CREDENTIALS: ${{ secrets.GA4_CREDENTIALS }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      
      - name: Commit optimizations
        run: |
          git config user.name "Analytics Bot"
          git config user.email "bot@dentalfinancepartners.co.uk"
          git add .
          git commit -m "Auto-optimize content based on GA4 data" || echo "No optimizations"
          git pull --rebase
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
