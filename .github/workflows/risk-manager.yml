name: Risk Manager

on:
  # Disabled 2026-05-18: every-6h health check ran the risk_manager agent
  # without delivering visible value. Manual trigger remains. Re-enable
  # if/when the alerting pipeline is wired up to a destination that gets
  # read.
  # schedule:
  #   - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  risk-check:
    name: System Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install anthropic httpx python-dotenv
      
      - name: Run Risk Manager
        run: python agents/risk_manager_agent.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
