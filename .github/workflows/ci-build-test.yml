name: CI - Build & Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-dentists:
    name: Test Dentists Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Dentists/web/package-lock.json

      - name: Install dependencies
        working-directory: Dentists/web
        run: npm ci

      - name: Run ESLint
        working-directory: Dentists/web
        run: npm run lint

      - name: Type check
        working-directory: Dentists/web
        run: npx tsc --noEmit

      - name: Build
        working-directory: Dentists/web
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://dentalfinancepartners.co.uk
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY }}

  test-property:
    name: Test Property Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Property/web/package-lock.json

      - name: Install dependencies
        working-directory: Property/web
        run: npm ci

      - name: Run ESLint
        working-directory: Property/web
        run: npm run lint

      - name: Type check
        working-directory: Property/web
        run: npx tsc --noEmit

      - name: Build
        working-directory: Property/web
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://propertytaxpartners.co.uk
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY }}

  test-python:
    name: Test Python Agents
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r agents/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 agents/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 agents/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Type check with mypy
        run: |
          pip install mypy types-httpx
          mypy agents/ --ignore-missing-imports || true
        continue-on-error: true

  status-check:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [test-dentists, test-property, test-python]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-dentists.result }}" != "success" ] || \
             [ "${{ needs.test-property.result }}" != "success" ] || \
             [ "${{ needs.test-python.result }}" != "success" ]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All tests passed!"
