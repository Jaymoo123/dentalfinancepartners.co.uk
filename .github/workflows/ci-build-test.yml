name: CI - Build & Lint

# Workspace-correct CI (Phase A / W4a rewrite, 2026-06-10).
# This repo is an npm-workspaces monorepo with ONE root package-lock.json.
# The previous workflow ran `npm ci` inside each <Site>/web with
# cache-dependency-path pointing at per-site lockfiles that do not exist,
# so every run failed at the install/cache step and the estate had no CI net.
# Each job now installs the whole workspace from the root lockfile, then
# lints / type-checks / tests / builds one site in its own directory.
#
# P0-4 scaling: a `changes` job git-diffs the PR against its base and emits a
# dynamic matrix (fromJSON) of only the sites whose own directory changed.
# Any change to shared infra (packages/**, root package.json / lockfile, this
# workflow, root ts/lint config) — or any push to main — runs the FULL matrix,
# so a breaking change to packages/web-shared still fails every consumer build.
# To add a site: append one "site|url" line to SITES in the changes job.
# `npm run test --if-present` is a green no-op until W4b lands suites.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    name: Detect changed sites
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need base-branch history for git diff

      - name: Compute site matrix
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          # Single source of truth for the site matrix: "dir|url" per line.
          SITES='
          Dentists|https://dentalfinancepartners.co.uk
          Property|https://propertytaxpartners.co.uk
          Medical|https://www.medicalaccounts.co.uk
          Solicitors|https://www.accountsforlawyers.co.uk
          generalist|https://www.hollowaydavies.co.uk
          digital-agency|https://www.agencyfounderfinance.co.uk
          console|https://console.internal
          contractors-ir35|https://www.contractortaxaccountants.co.uk
          construction-cis|https://www.tradetaxspecialists.co.uk
          charities|https://www.brand-tbd-charities.invalid
          hospitality|https://www.brand-tbd-hospitality.invalid
          care|https://www.brand-tbd-care.invalid
          crypto|https://www.digitalassettaxpartners.co.uk
          '

          FULL=false
          CHANGED=""
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            FULL=true   # push to main: always run everything
          else
            git fetch --no-tags --depth=1 origin "$BASE_REF" || true
            CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD)
            # Shared infra the site builds depend on -> full matrix.
            if echo "$CHANGED" | grep -qE '^(packages/|package\.json|package-lock\.json|tsconfig|\.github/workflows/ci-build-test\.yml)'; then
              FULL=true
            fi
          fi

          include="["
          sep=""
          while IFS='|' read -r site url; do
            [ -z "$site" ] && continue
            if [ "$FULL" = true ] || echo "$CHANGED" | grep -q "^$site/"; then
              include="$include$sep{\"site\":\"$site\",\"url\":\"$url\"}"
              sep=","
            fi
          done <<< "$(echo "$SITES" | sed 's/^ *//')"
          include="$include]"

          echo "matrix=$include" >> "$GITHUB_OUTPUT"
          if [ "$include" = "[]" ]; then echo "any=false" >> "$GITHUB_OUTPUT"; else echo "any=true" >> "$GITHUB_OUTPUT"; fi
          echo "Selected matrix: $include"

  test-sites:
    name: Build ${{ matrix.site }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.site }}/web
        run: npm run lint

      - name: Type check
        working-directory: ${{ matrix.site }}/web
        run: npx tsc --noEmit

      - name: Unit tests (if present)
        working-directory: ${{ matrix.site }}/web
        run: npm run test --if-present

      - name: Build
        working-directory: ${{ matrix.site }}/web
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ matrix.url }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY }}

  test-web-shared:
    name: Test web-shared package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace
        run: npm ci

      # No-op until W4b adds a test script + suite to packages/web-shared.
      - name: Unit tests (if present)
        run: npm run test --if-present --workspace packages/web-shared

  test-python:
    name: Test Python Agents
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r agents/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 agents/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 agents/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Type check with mypy
        run: |
          pip install mypy types-httpx
          mypy agents/ --ignore-missing-imports || true
        continue-on-error: true

  status-check:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [changes, test-sites, test-web-shared, test-python]
    if: always()

    steps:
      - name: Check test results
        run: |
          # test-sites is skipped when no site dirs changed on a PR; skipped is OK.
          if [ "${{ needs.test-sites.result }}" != "success" ] && \
             [ "${{ needs.test-sites.result }}" != "skipped" ]; then
            echo "test-sites failed"
            exit 1
          fi
          if [ "${{ needs.test-web-shared.result }}" != "success" ] || \
             [ "${{ needs.test-python.result }}" != "success" ]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All tests passed!"
