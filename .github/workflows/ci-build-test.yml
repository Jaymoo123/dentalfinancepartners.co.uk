name: CI - Build & Lint

# Workspace-correct CI (Phase A / W4a rewrite, 2026-06-10).
# This repo is an npm-workspaces monorepo with ONE root package-lock.json.
# The previous workflow ran `npm ci` inside each <Site>/web with
# cache-dependency-path pointing at per-site lockfiles that do not exist,
# so every run failed at the install/cache step and the estate had no CI net.
# Each job now installs the whole workspace from the root lockfile, then
# lints / type-checks / tests / builds one site in its own directory.
#
# PF-04 net: every site job runs on every push/PR, so a breaking change to
# packages/web-shared fails the consumer builds here.
# `npm run test --if-present` is a green no-op until W4b lands suites.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-sites:
    name: Build ${{ matrix.site }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - site: Dentists
            url: https://dentalfinancepartners.co.uk
          - site: Property
            url: https://propertytaxpartners.co.uk
          - site: Medical
            url: https://www.medicalaccounts.co.uk
          - site: Solicitors
            url: https://www.accountsforlawyers.co.uk
          - site: generalist
            url: https://www.hollowaydavies.co.uk
          - site: digital-agency
            url: https://www.agencyfounderfinance.co.uk
          - site: console
            url: https://console.internal
          - site: contractors-ir35
            url: https://www.contractortaxaccountants.co.uk
          - site: construction-cis
            url: https://www.tradetaxspecialists.co.uk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.site }}/web
        run: npm run lint

      - name: Type check
        working-directory: ${{ matrix.site }}/web
        run: npx tsc --noEmit

      - name: Unit tests (if present)
        working-directory: ${{ matrix.site }}/web
        run: npm run test --if-present

      - name: Build
        working-directory: ${{ matrix.site }}/web
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ matrix.url }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY }}

  test-web-shared:
    name: Test web-shared package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace
        run: npm ci

      # No-op until W4b adds a test script + suite to packages/web-shared.
      - name: Unit tests (if present)
        run: npm run test --if-present --workspace packages/web-shared

  test-python:
    name: Test Python Agents
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r agents/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 agents/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 agents/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Type check with mypy
        run: |
          pip install mypy types-httpx
          mypy agents/ --ignore-missing-imports || true
        continue-on-error: true

  status-check:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [test-sites, test-web-shared, test-python]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-sites.result }}" != "success" ] || \
             [ "${{ needs.test-web-shared.result }}" != "success" ] || \
             [ "${{ needs.test-python.result }}" != "success" ]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All tests passed!"
