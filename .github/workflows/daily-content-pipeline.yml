name: Daily Content Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily (blog generation only)
    - cron: '0 2 1 * *'  # 2 AM UTC on 1st of month (keyword refresh)
  workflow_dispatch:  # Manual trigger
    inputs:
      refresh_keywords:
        description: 'Refresh keyword topic tree'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refresh-keyword-tree:
    name: Refresh Keyword Topic Tree (Monthly)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 1 * *' || github.event.inputs.refresh_keywords == 'true'
    strategy:
      matrix:
        niche: [Dentists, Property]
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install anthropic httpx python-dotenv
      
      - name: Run Keyword Topic Tree Builder for ${{ matrix.niche }}
        run: python agents/keyword_topic_tree_builder.py --niche ${{ matrix.niche }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

  generate-blogs:
    name: Generate Blogs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        niche: [Dentists, Property]
      max-parallel: 1  # Sequential execution to avoid API rate limits
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install anthropic httpx python-dotenv
      
      - name: Generate blog content for ${{ matrix.niche }}
        run: python agents/blog_generation_agent.py --niche ${{ matrix.niche }} --max-posts 1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      
      - name: Sync shared components to ${{ matrix.niche }}
        run: python scripts/sync_shared_components.py --niche ${{ matrix.niche }}
      
      - name: Deploy content from Supabase to file system
        run: python agents/deployment_agent.py --niche ${{ matrix.niche }} --max-deployments 10
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      
      - name: Commit deployed content and synced components
        run: |
          git config user.name "Content Bot"
          git config user.email "bot@dentalfinancepartners.co.uk"
          git add ${{ matrix.niche }}/web/content/blog/
          git add ${{ matrix.niche }}/web/src/
          git add ${{ matrix.niche }}/niche.config.json
          git commit -m "Deploy blog content for ${{ matrix.niche }}" || echo "No changes to commit"
          git pull --rebase
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
