name: Content Quality Check

on:
  push:
    paths:
      - '**/web/content/blog/**'
      - 'README.md'
      - '.cursor/rules/**'
      - 'Admin/ISSUE_LOG.md'
      - '**/niche.config.json'
  pull_request:
    paths:
      - '**/web/content/blog/**'
      - 'README.md'
      - '.cursor/rules/**'
      - 'Admin/ISSUE_LOG.md'
      - '**/niche.config.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-content:
    name: Validate Blog Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run content validator
        run: python scripts/validate_blog_content.py --verbose

  validate-docs:
    name: Validate Documentation Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run docs validator
        run: python scripts/validate_docs.py --verbose
