name: Content Quality Check

on:
  push:
    paths:
      - '**/web/content/blog/**'
      - 'README.md'
      - '.cursor/rules/**'
      - 'Admin/ISSUE_LOG.md'
      - '**/niche.config.json'
  pull_request:
    paths:
      - '**/web/content/blog/**'
      - 'README.md'
      - '.cursor/rules/**'
      - 'Admin/ISSUE_LOG.md'
      - '**/niche.config.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-content:
    name: Validate Blog Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff against the push/PR base

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      # Changed-files-only enforcement: errors only fail for files changed in
      # this push/PR; legacy corpus issues print as warnings. Full-corpus
      # enforcement remains available via `--full` (run locally / dispatch).
      - name: Run content validator
        env:
          VALIDATE_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          # New-branch pushes report an all-zero "before" SHA; fall back to HEAD~1.
          if echo "$VALIDATE_BASE_REF" | grep -qE '^0+$'; then unset VALIDATE_BASE_REF; fi
          python scripts/validate_blog_content.py --verbose

  validate-docs:
    name: Validate Documentation Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run docs validator
        run: python scripts/validate_docs.py --verbose
